<!DOCTYPE html>
<html>
    <head>
        <title>web world - coming soon</title>
        <link rel="icon" id="favicon" type="image/x-icon" href="favicon-light.ico">
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            html {
                height: 100%;
                width: 100%;
            }

            body {
                background-image: url('space4.png');
                width: 100%;
                height: 100%;
            }

            .container {
                width: 100%;
                height: 100%;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            p {
                font-size: 2rem;
                color: white;
                text-align: center;
                margin: 1rem 0;
            }

            img {
                width: 50%;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <p><b>THIS WEBSITE IS UNDER CONSTRUCTION!!!</b></p>
            <img src="construction.gif"/>
            <p id="quip"></p>
        </div>

        <script>
            const quips = [
                "Keep refreshing! One day, it'll work!",
                "If you're lost, try <a href='https://google.com'>google.com</a>.<br/>If you're lost and hate AI, try <a href='https://noai.duckduckgo.com'>duckduckgo.com</a>.",
                "Oops! I rm -rf'd all my code and have to start over.",
                "This page took 4 and a half months to make.",
                "It's dangerous to enter active construction sites.<br/>You should probably leave.",
                "Made with Grok. Just kidding. Made with hate for Grok.",
                "Help! I'm trapped in this website!",
                "Your IP address is: between 0.0.0.0 and 255.255.255.255.",
                "Go to sleep. Oh, sorry, that was meant for me.",
                "\"The Cloud\" is a real cloud. In the sky. I've seen it.",
                "Sent from my iPhone.",
                "Congratulations! You are the 100th visitor!<br/>Well, I'm not really sure. I haven't been counting."
            ];
            document.getElementById("quip").innerHTML = quips[Math.floor(Math.random() * quips.length)];
        </script>
    </body>
</html>
